name: 🐛 Bug Report
about: Create a report to help us improve Nexus-V
title: '[BUG] '
labels: bug
body:
  - type: markdown
    attributes:
      value: |
        ### 🩺 Nexus-V Bug Report
        Thank you for reporting this! Please run `nexus-v doctor` before submitting to ensure your environment is healthy.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we recreate this issue?
      placeholder: |
        1. Run 'nexus-v init ...'
        2. See error...
    validations:
      required: true

  - type: textarea
    id: doctor-output
    attributes:
      label: Nexus-V Doctor Output
      description: Paste the output of `nexus-v doctor` here.
      render: shell
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Nexus-V Version
      description: Run `nexus-v version`.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context about the problem here (e.g. VS Code version, OS, etc).
