name: 🧱 Auto-Merge Trusted PRs

on:
  pull_request:
    types: [opened, reopened, synchronized, ready_for_review]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to handle manually"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-handle:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.pull_request.user.login == 'billykidd-stillsystems' ||
      github.event.pull_request.user.login == 'stillsystems-bot' ||
      contains(github.event.pull_request.labels.*.name, 'brand-sync')
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Auto-approve and Enable Auto-merge
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GORELEASER_TOKEN }}
        run: |
          # Determine PR URL
          if [ -n "${{ github.event.inputs.pr_number }}" ]; then
            PR_URL=$(gh pr view "${{ github.event.inputs.pr_number }}" --json url --jq .url)
          else
            PR_URL=${{ github.event.pull_request.html_url }}
          fi

          if [ -z "$PR_URL" ]; then
            echo "No PR found to handle."
            exit 0
          fi

          echo "Handling PR: $PR_URL"
          gh pr review "$PR_URL" --approve || echo "Could not approve"
          gh pr merge "$PR_URL" --auto --merge || echo "Could not enable auto-merge"
