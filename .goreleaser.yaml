# .goreleaser.yaml
version: 2

project_name: nexus-v

before:
  hooks:
    - go mod tidy

builds:
  - id: archive
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    main: ./cmd
    binary: nexus-v

  - id: raw
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    main: ./cmd
    binary: nexus-v-{{ .Os }}-{{ .Arch }}

archives:
  - builds:
      - archive
    format: tar.gz
    # use zip for windows archives
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE
      - CHANGELOG.md

checksum:
  name_template: "checksums.txt"

snapshot:
  name_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

brews:
  - name: nexus-v
    repository:
      owner: billy-kidd-dev
      name: homebrew-nexusv
    directory: Formula
    homepage: "https://github.com/billy-kidd-dev/nexus-v"
    description: "A modern, zero-install VS Code extension scaffolder."
    license: "MIT"
    install: |
      bin.install "nexus-v"

scoops:
  - name: nexus-v
    repository:
      owner: billy-kidd-dev
      name: scoop-bucket
    homepage: "https://github.com/billy-kidd-dev/nexus-v"
    description: "A modern, zero-install VS Code extension scaffolder."
    license: "MIT"

winget:
  - name: nexus-v
    publisher: Billy Kidd
    package_identifier: BillyKidd.NexusV
    short_description: "A modern, zero-install VS Code extension scaffolder."
    description: "NEXUS-V replaces the legacy Yeoman generator with a single static binary that produces clean VS Code extension projects."
    license: MIT
    homepage: "https://github.com/billy-kidd-dev/nexus-v"
    publisher_url: "https://github.com/billy-kidd-dev"
    tags:
      - vscode
      - extension
      - yeoman
      - scaffolder
    repository:
      owner: billy-kidd-dev
      name: winget-nexusv
    # Only use the Windows amd64 archive
    ids:
      - archive
    goos:
      - windows
    goarch:
      - amd64



